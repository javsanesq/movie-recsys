<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOVIE-RECSYS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="topbar">
    <h1>MOVIE-RECSYS</h1>
    <div id="stage-toggle" role="group" aria-label="Recommendation stage">
      <button id="btn-both" class="toggle-btn active" data-stage="both">Both (re-ranked)</button>
      <button id="btn-retrieval" class="toggle-btn" data-stage="retrieval">Stage 1 (retrieval)</button>
    </div>
  </header>

  <main id="grid">
    <!-- Left: User Profile -->
    <section id="profile" aria-label="User profile">
      <h2>User Profile</h2>
      <div id="search-row">
        <input id="user-input" type="number" min="1" placeholder="User ID" aria-label="User ID" />
        <button id="search-btn">Search</button>
      </div>
      <div id="profile-error" class="error" hidden></div>
      <div id="profile-content" hidden>
        <dl id="profile-stats">
          <dt>Ratings</dt><dd id="stat-ratings"></dd>
          <dt>Avg rating</dt><dd id="stat-avg"></dd>
          <dt>Top genres</dt><dd id="stat-genres"></dd>
        </dl>
        <h3>Genre Affinity</h3>
        <div id="affinity-bars"></div>
      </div>
    </section>

    <!-- Center: Recommendations -->
    <section id="recs" aria-label="Recommendations">
      <h2>Recommendations <span id="recs-stage-label" class="stage-label"></span></h2>
      <div id="recs-spinner" class="spinner" hidden></div>
      <div id="recs-error" class="error" hidden></div>
      <div id="recs-empty" class="notice" hidden>Search for a user to see recommendations.</div>
      <ol id="recs-list" hidden></ol>
    </section>

    <!-- Right: Metrics -->
    <section id="metrics" aria-label="Model metrics">
      <h2>Model Metrics</h2>
      <div id="metrics-spinner" class="spinner"></div>
      <div id="metrics-error" class="error" hidden></div>
      <div id="metrics-content" hidden>
        <h3>NDCG@10 Comparison</h3>
        <div id="ndcg-bars"></div>
        <h3>Feature Importance (top 10)</h3>
        <div id="feature-bars"></div>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
